services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - HOST=0.0.0.0
      - PORT=5001
    volumes:
      # Mount your local scanning directory to /data inside the container.
      # You can replace "./data" with the absolute path to your scanning files.
      - ./data:/data
    restart: unless-stopped
