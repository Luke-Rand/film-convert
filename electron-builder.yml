appId: com.filmconvert.app
productName: FilmConvert
publish:
  provider: github
  owner: Luke-Rand
  repo: film-convert
  releaseType: release
directories:
  output: dist-app
files:
  - main.js
  - preload.js
  - package.json
extraResources:
  - from: dist/backend
    to: backend
mac:
  target: dmg
  category: public.app-category.photography
  icon: assets/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target: nsis
  icon: assets/icon.png
